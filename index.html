<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Profesionální faktura</title>
    <style>
        body { font-family: 'Times New Roman', serif; padding: 20px; line-height: 1.4; color: #000; }
        .container { max-width: 800px; margin: auto; border: 1px solid #ccc; padding: 40px; }
        
        /* Nová horní lišta */
        .top-bar { display: flex; justify-content: space-between; align-items: center; background: #f9f9f9; padding: 15px; margin-bottom: 20px; border: 1px solid #eee; }
        
        h1 { margin: 0; font-size: 24px; text-transform: uppercase; text-align: right; }
        .header-info { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 30px; }
        
        .box { margin-bottom: 20px; }
        .box h4 { margin: 0 0 5px 0; border-bottom: 1px solid #000; font-size: 14px; }
        
        input, textarea, select { border: 1px solid #ccc; padding: 5px; width: 100%; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th { border-bottom: 2px solid #000; text-align: left; }
        td { border-bottom: 1px solid #eee; padding: 8px 0; }
        
        .no-print { margin-top: 20px; }
        .btn { padding: 10px 20px; cursor: pointer; border: none; background: #333; color: white; margin-right: 5px; }

        @media print {
            .no-print { display: none !important; }
            .container { border: none; padding: 0; }
            input, textarea { border: none; background: transparent; padding: 0; }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- Nová horní lišta -->
    <div class="top-bar no-print">
        <div>
            <strong>Správa vzorů:</strong>
            <input type="text" id="template-name" placeholder="Název nového vzoru" style="width: 150px;">
            <button class="btn" onclick="saveTemplate()">Uložit</button>
            <select id="template-select" onchange="loadTemplate()" style="width: 150px;">
                <option value="">-- Vyberte vzor --</option>
            </select>
        </div>
        <button class="btn" onclick="toggleModal()" style="background: #6c757d;">Upravit moje údaje</button>
    </div>

    <div class="header-info">
        <div>
            <strong>Dodavatel:</strong><br>
            <span id="disp-name">Nastavte v menu</span><br>
            <span id="disp-address"></span><br>
            IČO: <span id="disp-ico"></span>
        </div>
        <!-- Integrované číslo faktury -->
        <h1>Faktura Č. <input type="text" id="inv-num" placeholder="0000001" style="width: 150px; font-size: 20px; font-family: inherit; text-align: right;"></h1>
    </div>

    <div class="box">
        <h4>Odběratel:</h4>
        <input type="text" id="client-name" placeholder="Jméno firmy / Klienta">
        <input type="text" id="client-address" placeholder="Adresa">
        <input type="text" id="client-ico" placeholder="IČO / DIČ">
    </div>

    <div class="box">
        Datum vystavení: <input type="date" id="date-issue" style="width: auto;">
        Datum splatnosti: <input type="date" id="date-due" style="width: auto;">
    </div>

    <table id="items-table">
        <thead>
            <tr>
                <th>Položka</th>
                <th>Cena</th>
                <th class="no-print">Akce</th>
            </tr>
        </thead>
        <tbody id="items-body">
            <tr>
                <td><input type="text" class="item-desc" placeholder="Popis služby"></td>
                <td><input type="number" class="price" value="0" onchange="calcTotal()" style="width: 100px;"></td>
                <td class="no-print"></td>
            </tr>
        </tbody>
    </table>
    
    <button class="btn no-print" onclick="addItem()">+ Přidat položku</button>
    <h2 style="text-align: right;">Celkem: <span id="total">0</span> Kč</h2>

    <div class="box">
        <h4>Platební údaje:</h4>
        <textarea id="payment-info" placeholder="Bankovní spojení, IBAN, VS..."></textarea>
    </div>

    <button class="btn no-print" onclick="window.print()" style="width: 100%; background: #007bff; font-size: 18px;">Vytisknout / Uložit PDF</button>
</div>

<!-- Modal -->
<div id="settings-modal" style="display:none; position:fixed; top:20%; left:30%; background:white; padding:20px; border:1px solid #ccc; z-index:1000; box-shadow: 0 0 10px rgba(0,0,0,0.2);">
    <h3>Moje údaje</h3>
    <input type="text" id="my-name" placeholder="Název firmy">
    <input type="text" id="my-address" placeholder="Adresa">
    <input type="text" id="my-ico" placeholder="IČO">
    <button class="btn" onclick="saveSettings()">Uložit</button>
</div>

<script>
    // --- Cookies Helpers ---
    function setCookie(cname, cvalue, exdays) {
        const d = new Date();
        d.setTime(d.getTime() + (exdays*24*60*60*1000));
        document.cookie = cname + "=" + encodeURIComponent(cvalue) + ";" + "expires="+ d.toUTCString() + ";path=/";
    }

    function getCookie(cname) {
        let name = cname + "=";
        let decodedCookie = decodeURIComponent(document.cookie);
        let ca = decodedCookie.split(';');
        for(let i = 0; i < ca.length; i++) {
            let c = ca[i].trim();
            if (c.indexOf(name) == 0) return c.substring(name.length, c.length);
        }
        return "";
    }

    // --- On Load ---
    window.onload = () => {
        const settings = JSON.parse(getCookie('invoice_settings') || '{}');
        if (settings.name) {
            document.getElementById('disp-name').innerText = settings.name;
            document.getElementById('disp-address').innerText = settings.address;
            document.getElementById('disp-ico').innerText = settings.ico;
            document.getElementById('my-name').value = settings.name;
            document.getElementById('my-address').value = settings.address;
            document.getElementById('my-ico').value = settings.ico;
        }
        updateTemplatesDropdown();
    };

    function toggleModal() {
        const m = document.getElementById('settings-modal');
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
    }

    function saveSettings() {
        const data = {
            name: document.getElementById('my-name').value,
            address: document.getElementById('my-address').value,
            ico: document.getElementById('my-ico').value
        };
        setCookie('invoice_settings', JSON.stringify(data), 365);
        location.reload();
    }

    // --- Template Logic ---
    function saveTemplate() {
        const name = document.getElementById('template-name').value;
        if (!name) return alert("Zadejte název vzoru");
        
        let templates = JSON.parse(getCookie('invoice_templates') || '{}');
        
        const currentData = {
            clientName: document.getElementById('client-name').value,
            clientAddress: document.getElementById('client-address').value,
            clientIco: document.getElementById('client-ico').value,
            items: Array.from(document.querySelectorAll('#items-body tr')).map(tr => ({
                desc: tr.querySelector('.item-desc').value,
                price: tr.querySelector('.price').value
            })),
            payment: document.getElementById('payment-info').value
        };

        templates[name] = currentData;
        setCookie('invoice_templates', JSON.stringify(templates), 365);
        updateTemplatesDropdown();
        alert("Vzor uložen");
    }

    function updateTemplatesDropdown() {
        const select = document.getElementById('template-select');
        const templates = JSON.parse(getCookie('invoice_templates') || '{}');
        select.innerHTML = '<option value="">-- Vyberte vzor --</option>';
        for (let name in templates) {
            select.innerHTML += `<option value="${name}">${name}</option>`;
        }
    }

    function loadTemplate() {
        const name = document.getElementById('template-select').value;
        if (!name) return;
        const templates = JSON.parse(getCookie('invoice_templates') || '{}');
        const data = templates[name];

        document.getElementById('client-name').value = data.clientName;
        document.getElementById('client-address').value = data.clientAddress;
        document.getElementById('client-ico').value = data.clientIco;
        document.getElementById('payment-info').value = data.payment;

        document.getElementById('items-body').innerHTML = '';
        data.items.forEach(item => {
            const row = document.createElement('tr');
            row.innerHTML = `<td><input type="text" class="item-desc" value="${item.desc}"></td>
                             <td><input type="number" class="price" value="${item.price}" onchange="calcTotal()" style="width: 100px;"></td>
                             <td class="no-print"><button onclick="this.parentElement.parentElement.remove(); calcTotal();">X</button></td>`;
            document.getElementById('items-body').appendChild(row);
        });
        calcTotal();
    }

    function addItem() {
        const row = document.createElement('tr');
        row.innerHTML = `<td><input type="text" class="item-desc" placeholder="Popis služby"></td>
                         <td><input type="number" class="price" value="0" onchange="calcTotal()" style="width: 100px;"></td>
                         <td class="no-print"><button onclick="this.parentElement.parentElement.remove(); calcTotal();">X</button></td>`;
        document.getElementById('items-body').appendChild(row);
    }

    function calcTotal() {
        let total = 0;
        document.querySelectorAll('.price').forEach(i => total += parseFloat(i.value) || 0);
        document.getElementById('total').innerText = total;
    }
</script>

</body>
</html>
