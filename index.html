<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobilní Faktura</title>
    <style>
        :root { --primary: #333; --accent: #007bff; }
        body { font-family: sans-serif; padding: 10px; line-height: 1.5; color: #333; background: #f4f4f4; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        /* Responzivní prvky */
        input, textarea, select { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        .btn { padding: 12px; cursor: pointer; border: none; border-radius: 4px; background: var(--primary); color: white; width: 100%; margin-top: 5px; font-size: 16px; }
        .btn-blue { background: var(--accent); }
        .btn-danger { background: #dc3545; }
        
        .top-bar { display: flex; flex-direction: column; gap: 10px; padding-bottom: 20px; border-bottom: 2px solid #eee; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th { text-align: left; padding: 10px; border-bottom: 2px solid #333; }
        td { padding: 8px 0; }
        
        @media print {
            .no-print { display: none !important; }
            body { background: white; }
            .container { box-shadow: none; padding: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar no-print">
        <strong>Správa vzorů:</strong>
        <input type="text" id="template-name" placeholder="Název nového vzoru">
        <button class="btn" onclick="saveTemplate()">Uložit vzor</button>
        <select id="template-select" onchange="loadTemplate()">
            <option value="">-- Vyberte vzor --</option>
        </select>
        <button class="btn btn-danger" onclick="deleteTemplate()">Smazat vybraný vzor</button>
        <button class="btn" onclick="toggleModal()" style="background:#6c757d;">Nastavení dodavatele</button>
    </div>

    <h1>Faktura č. <input type="text" id="inv-num" placeholder="2026001"></h1>
    <div id="vendor-info"><strong>Dodavatel:</strong> <span id="disp-name">Nastavte v menu</span></div>
    
    <hr>
    <h3>Odběratel:</h3>
    <input type="text" id="client-name" placeholder="Firma / Klient">
    <input type="text" id="client-address" placeholder="Adresa">
    <input type="text" id="client-ico" placeholder="IČO">

    <table id="items-table">
        <thead><tr><th>Položka</th><th>Cena</th><th class="no-print">X</th></tr></thead>
        <tbody id="items-body"></tbody>
    </table>
    
    <button class="btn no-print" onclick="addItem()">+ Přidat položku</button>
    <h2 style="text-align: right;">Celkem: <span id="total">0</span> Kč</h2>

    <textarea id="payment-info" placeholder="Platební údaje (IBAN, VS...)"></textarea>
    <button class="btn btn-blue no-print" onclick="window.print()">Vytisknout / PDF</button>
</div>

<div id="settings-modal" style="display:none; position:fixed; top:10%; left:5%; width:90%; background:white; padding:20px; border-radius:8px; z-index:1000; box-shadow:0 0 20px rgba(0,0,0,0.3);">
    <h3>Vaše údaje</h3>
    <input type="text" id="my-name" placeholder="Vaše jméno/firma">
    <input type="text" id="my-address" placeholder="Vaše adresa">
    <input type="text" id="my-ico" placeholder="Vaše IČO">
    <button class="btn" onclick="saveSettings()">Uložit</button>
    <button class="btn btn-danger" onclick="toggleModal()">Zavřít</button>
</div>

<script>
    // --- Funkce ---
    function formatNumber(num) { return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " "); }
    
    function calcTotal() {
        let total = 0;
        document.querySelectorAll('.price').forEach(i => total += parseFloat(i.value) || 0);
        document.getElementById('total').innerText = formatNumber(total);
    }

    function addItem(desc = '', price = 0) {
        const row = document.createElement('tr');
        row.innerHTML = `<td><input type="text" class="item-desc" value="${desc}" placeholder="Popis"></td>
                         <td><input type="number" class="price" value="${price}" oninput="calcTotal()" style="width:80px"></td>
                         <td class="no-print"><button class="btn btn-danger" style="padding:5px" onclick="this.parentElement.parentElement.remove(); calcTotal();">X</button></td>`;
        document.getElementById('items-body').appendChild(row);
        calcTotal();
    }

    // --- Ukládání (LocalStorage místo cookies pro větší kapacitu) ---
    function saveSettings() {
        const data = { name: document.getElementById('my-name').value, address: document.getElementById('my-address').value, ico: document.getElementById('my-ico').value };
        localStorage.setItem('inv_settings', JSON.stringify(data));
        location.reload();
    }

    function saveTemplate() {
        const name = document.getElementById('template-name').value;
        if (!name) return alert("Zadejte název");
        let templates = JSON.parse(localStorage.getItem('inv_templates') || '{}');
        templates[name] = {
            client: { name: document.getElementById('client-name').value, addr: document.getElementById('client-address').value, ico: document.getElementById('client-ico').value },
            items: Array.from(document.querySelectorAll('#items-body tr')).map(tr => ({ desc: tr.querySelector('.item-desc').value, price: tr.querySelector('.price').value })),
            payment: document.getElementById('payment-info').value
        };
        localStorage.setItem('inv_templates', JSON.stringify(templates));
        updateTemplatesDropdown();
    }

    function deleteTemplate() {
        const name = document.getElementById('template-select').value;
        if (!name) return;
        let templates = JSON.parse(localStorage.getItem('inv_templates') || '{}');
        delete templates[name];
        localStorage.setItem('inv_templates', JSON.stringify(templates));
        updateTemplatesDropdown();
    }

    function updateTemplatesDropdown() {
        const select = document.getElementById('template-select');
        const templates = JSON.parse(localStorage.getItem('inv_templates') || '{}');
        select.innerHTML = '<option value="">-- Vyberte vzor --</option>';
        for (let name in templates) select.innerHTML += `<option value="${name}">${name}</option>`;
    }

    function loadTemplate() {
        const name = document.getElementById('template-select').value;
        if (!name) return;
        const templates = JSON.parse(localStorage.getItem('inv_templates') || '{}');
        const data = templates[name];
        document.getElementById('client-name').value = data.client.name;
        document.getElementById('client-address').value = data.client.addr;
        document.getElementById('client-ico').value = data.client.ico;
        document.getElementById('payment-info').value = data.payment;
        document.getElementById('items-body').innerHTML = '';
        data.items.forEach(i => addItem(i.desc, i.price));
    }

    function toggleModal() {
        const m = document.getElementById('settings-modal');
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
    }

    window.onload = () => {
        const s = JSON.parse(localStorage.getItem('inv_settings') || '{}');
        if (s.name) {
            document.getElementById('disp-name').innerText = s.name;
            document.getElementById('my-name').value = s.name;
            document.getElementById('my-address').value = s.address;
            document.getElementById('my-ico').value = s.ico;
        }
        updateTemplatesDropdown();
        addItem();
    };
</script>
</body>
</html>
